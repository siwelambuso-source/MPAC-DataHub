<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
  <meta name="theme-color" content="#0a2f44">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MPAC DataHub | Mpolonjeni Alliance Church - Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary-red: #c62828;
      --primary-red-dark: #b71c1c;
      --primary-blue: #0a2f44;
      --primary-blue-light: #1e4a6e;
      --primary-gold: #f5b042;
      --accent-green: #2e7d64;
      --shadow-md: 0 8px 20px rgba(0,0,0,0.1);
      --radius-lg: 28px;
      --radius-md: 20px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fefefe 0%, #fcfaf7 100%);
      padding-bottom: 80px;
      position: relative;
    }
    .container { max-width: 700px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }
    .card { background: rgba(255,255,255,0.94); backdrop-filter: blur(4px); border-radius: var(--radius-lg); margin-bottom: 20px; box-shadow: var(--shadow-md); overflow: hidden; }
    .card-header { background: linear-gradient(135deg, rgba(10,47,68,0.94), rgba(30,74,110,0.94)); padding: 16px 20px; color: white; border-bottom: 3px solid var(--primary-gold); }
    .card-header .card-title { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .card-body { padding: 20px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 700; font-size: 0.75rem; margin-bottom: 6px; color: #2c3e2f; text-transform: uppercase; letter-spacing: 0.8px; }
    .form-group select, .form-group input, .form-group textarea { width: 100%; padding: 14px 16px; border: 1px solid rgba(0,0,0,0.12); border-radius: var(--radius-md); font-family: inherit; font-size: 0.9rem; background: white; }
    .btn-primary { background: linear-gradient(135deg, var(--primary-red), var(--primary-red-dark)); color: white; border: none; padding: 14px 20px; border-radius: 60px; font-weight: 800; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-secondary { background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-light)); color: white; border: none; padding: 12px 20px; border-radius: 60px; font-weight: 700; cursor: pointer; }
    .tab-nav { display: flex; gap: 8px; overflow-x: auto; padding: 6px; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-radius: 80px; margin-bottom: 20px; }
    .tab-btn { flex: 1; white-space: nowrap; background: transparent; border: none; padding: 10px 12px; border-radius: 60px; font-weight: 800; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; color: #3b3a36; }
    .tab-btn.active { background: linear-gradient(135deg, var(--primary-red), var(--primary-red-dark)); color: white; }
    .data-table { overflow-x: auto; font-size: 0.75rem; }
    .data-table table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e7e5e4; }
    .chart-container { height: 260px; margin: 20px 0; background: rgba(255,255,255,0.7); border-radius: 28px; padding: 12px; }
    .dashboard-kpi { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .kpi-card { background: white; border-radius: 28px; padding: 16px; flex: 1; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--primary-gold); }
    .kpi-number { font-size: 1.8rem; font-weight: 800; color: var(--primary-red); }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 60px; font-size: 0.8rem; z-index: 2000; display: none; font-weight: 600; }
    .hidden { display: none; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <div class="app-header" style="background: var(--primary-blue); color: white; padding: 16px 20px; position: sticky; top: 0; z-index: 100;">
    <div class="header-content" style="max-width: 700px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
      <h1 style="font-size: 1.2rem;"><i class="fas fa-church"></i> MPAC DataHub</h1>
      <div id="syncStatus" style="font-size: 0.7rem; opacity: 0.8;"><i class="fas fa-cloud"></i> Online</div>
    </div>
  </div>

  <div class="container">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="attendance"><i class="fas fa-edit"></i> Record</button>
      <button class="tab-btn" data-tab="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</button>
      <button class="tab-btn" data-tab="central"><i class="fas fa-database"></i> Database</button>
    </div>

    <div id="attendanceTab" class="tab-content active">
      <div class="card">
        <div class="card-header"><div class="card-title"><i class="fas fa-plus-circle"></i> New Entry</div></div>
        <div class="card-body">
          <form id="attendanceForm">
            <div class="form-group"><label>Date</label><input type="date" id="attDate" required></div>
            <div class="form-group">
              <label>Category</label>
              <select id="typeSelect" required>
                <option value="attendance">Attendance Record</option>
                <option value="meeting">Committee Meeting</option>
              </select>
            </div>
            <div id="attendanceFields">
              <div class="form-group"><label>Topic/Sermon</label><input type="text" id="topic" placeholder="Sermon title"></div>
              <div class="form-group"><label>Total Count</label><input type="number" id="totalCount" value="0"></div>
              <div class="form-group"><label>Offering (E)</label><input type="number" step="0.01" id="offering" value="0"></div>
            </div>
            <div id="meetingFields" class="hidden">
              <div class="form-group"><label>Committee Name</label><input type="text" id="meetCommittee" placeholder="e.g. LCB, Youth"></div>
              <div class="form-group"><label>Attendees</label><input type="number" id="meetCount" value="0"></div>
            </div>
            <button type="submit" id="saveBtn" class="btn-primary"><i class="fas fa-save"></i> Save & Sync</button>
          </form>
        </div>
      </div>
    </div>

    <div id="dashboardTab" class="tab-content">
      <div id="attKpi" class="dashboard-kpi"></div>
      <div class="chart-container"><canvas id="mainChart"></canvas></div>
    </div>

    <div id="centralTab" class="tab-content">
      <div class="card">
        <div class="card-body">
          <button id="refreshBtn" class="btn-secondary" style="margin-bottom:15px;"><i class="fas fa-sync"></i> Refresh from Cloud</button>
          <div id="dataTable" class="data-table"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toastMsg"></div>

  <script>
    const CENTRAL_PUSH_URL = "https://script.google.com/macros/s/AKfycbzbiApPBE7MFoHN5G6rsU12NiOdo48IYszDBadnZIVVXvL5hrHzC5nB7-ksD3kZJgyDyg/exec";
    let centralData = [];

    function showToast(msg) { 
      let t = document.getElementById("toastMsg"); 
      t.innerText = msg; t.style.display = "block"; 
      setTimeout(() => t.style.display = "none", 3000); 
    }

    // Toggle fields based on type
    document.getElementById('typeSelect').addEventListener('change', (e) => {
      document.getElementById('attendanceFields').classList.toggle('hidden', e.target.value !== 'attendance');
      document.getElementById('meetingFields').classList.toggle('hidden', e.target.value !== 'meeting');
    });

    // Save Data
    document.getElementById("attendanceForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById("saveBtn");
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      const type = document.getElementById('typeSelect').value;
      const payload = {
        type: type,
        data: {
          date: document.getElementById('attDate').value,
          topic: type === 'attendance' ? document.getElementById('topic').value : document.getElementById('meetCommittee').value,
          total: type === 'attendance' ? parseInt(document.getElementById('totalCount').value) : parseInt(document.getElementById('meetCount').value),
          offering: type === 'attendance' ? parseFloat(document.getElementById('offering').value) : 0
        }
      };

      try {
        const response = await fetch(CENTRAL_PUSH_URL, {
          method: "POST",
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const result = await response.json();
        if(result.status === 'success') {
          showToast("✨ Saved successfully!");
          document.getElementById("attendanceForm").reset();
          fetchData();
        }
      } catch (err) {
        showToast("❌ Error: Check Connection");
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save & Sync';
      }
    });

    // Pull Data
    async function fetchData() {
      try {
        const response = await fetch(CENTRAL_PUSH_URL, {
          method: "POST",
          body: JSON.stringify({ action: 'pull' })
        });
        const result = await response.json();
        if(result.status === 'success') {
          centralData = result.attendance;
          renderTable();
          renderChart();
          showToast("🔄 Data Synced");
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderTable() {
      const html = `<table><thead><th>Date</th><th>Topic/Comm</th><th>Total</th><th>Offering</th></thead><tbody>` +
        centralData.slice(0,10).map(r => `<tr><td>${r.date}</td><td>${r.topic}</td><td>${r.total}</td><td>E${r.offering}</td></tr>`).join('') + 
        `</tbody></table>`;
      document.getElementById("dataTable").innerHTML = html;
    }

    let myChart;
    function renderChart() {
      const ctx = document.getElementById('mainChart').getContext('2d');
      if(myChart) myChart.destroy();
      
      const labels = centralData.slice(-7).map(d => d.date);
      const values = centralData.slice(-7).map(d => d.total);

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{ label: 'Attendance', data: values, backgroundColor: '#c62828', borderRadius: 10 }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
      
      const totalAtt = centralData.reduce((s, r) => s + (r.total || 0), 0);
      document.getElementById("attKpi").innerHTML = `<div class="kpi-card"><div class="kpi-number">${totalAtt}</div><div>Total Attendees</div></div>`;
    }

    // Tab Logic
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn, .tab-content").forEach(el => el.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab + "Tab").classList.add("active");
        if(btn.dataset.tab === 'dashboard') renderChart();
      });
    });

    document.getElementById("refreshBtn").addEventListener("click", fetchData);
    document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
    fetchData();
  </script>
</body>
</html>
